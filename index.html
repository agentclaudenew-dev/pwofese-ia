<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Pwofesè IA - Matematik</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  </head>
  <body>
    <a-scene background="color: #87CEEB">

      <!-- Sol -->
      <a-plane position="0 0 0" rotation="-90 0 0"
               width="10" height="10" color="#8B4513"></a-plane>

      <!-- Murs -->
      <a-box position="0 2 -5" width="10" height="4"
             depth="0.1" color="#003087"></a-box>
      <a-box position="-5 2 0" rotation="0 90 0"
             width="10" height="4" depth="0.1" color="#003087"></a-box>
      <a-box position="5 2 0" rotation="0 90 0"
             width="10" height="4" depth="0.1" color="#003087"></a-box>

      <!-- Tableau noir -->
      <a-box position="0 2 -4.8" width="4" height="2.5"
             depth="0.05" color="#1a1a1a"></a-box>

      <!-- Texte sur le tableau -->
      <a-text value="Pwofesè IA - Matematik"
              position="-1.5 2.8 -4.7"
              color="#ffffff" width="4"></a-text>

      <a-text value="Byenvini ! Mwen pral ede ou\naprannn matematik jodi a."
              position="-1.8 2.2 -4.7"
              color="#00FF00" width="3.5"></a-text>

      <!-- Bureau du professeur -->
      <a-box position="0 0.5 -3.5" width="2"
             height="0.1" depth="1" color="#8B4513"></a-box>

      <!-- Drapeau haïtien (bleu et rouge) -->
      <a-box position="4 3 -4.8" width="0.8"
             height="0.3" depth="0.01" color="#003087"></a-box>
      <a-box position="4 2.7 -4.8" width="0.8"
             height="0.3" depth="0.01" color="#D21034"></a-box>

      <!-- Caméra (position de l'élève) -->
      <a-camera position="0 1.6 3"></a-camera>

    </a-scene>
  </body>
</html>
