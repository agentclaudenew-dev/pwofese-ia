<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Pwofesè IA - Matematik</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  </head>
  <body>
    <a-scene background="color: #87CEEB">

      <!-- Sol parquet -->
      <a-plane position="0 0 0" rotation="-90 0 0"
               width="12" height="12" color="#8B4513"></a-plane>

      <!-- Mur du fond -->
      <a-box position="0 2.5 -5" width="12" height="5"
             depth="0.1" color="#003087"></a-box>

      <!-- Mur gauche -->
      <a-box position="-6 2.5 0" rotation="0 90 0"
             width="12" height="5" depth="0.1" color="#003087"></a-box>

      <!-- Mur droit -->
      <a-box position="6 2.5 0" rotation="0 90 0"
             width="12" height="5" depth="0.1" color="#003087"></a-box>

      <!-- Plafond -->
      <a-plane position="0 5 0" rotation="90 0 0"
               width="12" height="12" color="#D21034"></a-plane>

      <!-- Tableau noir grand -->
      <a-box position="0 2.5 -4.9" width="6" height="3"
             depth="0.05" color="#1a1a1a"></a-box>

      <!-- Titre tableau -->
      <a-text value="Pwofese IA - Matematik"
              position="-2.5 3.7 -4.8"
              color="#FFFF00" width="5"></a-text>

      <!-- Lecon 1 : Addition -->
      <a-text value="Leson 1 : Adisyon\n\n25 + 37 = ?\n\nRepons : 62\n\n25 + 37 = 20 + 30 + 5 + 7\n       = 50 + 12 = 62"
              position="-2.5 3.2 -4.8"
              color="#00FF00" width="5"></a-text>

      <!-- Bureau professeur -->
      <a-box position="0 0.4 -3.5" width="2.5"
             height="0.08" depth="1" color="#5C3317"></a-box>
      <a-box position="-1 0.2 -3.5" width="0.1"
             height="0.4" depth="0.8" color="#5C3317"></a-box>
      <a-box position="1 0.2 -3.5" width="0.1"
             height="0.4" depth="0.8" color="#5C3317"></a-box>

      <!-- Drapeau Haiti -->
      <a-box position="0.05 3 -4.85" width="0.05"
             height="1.5" depth="0.05" color="#888888"></a-box>
      <a-box position="0.55 3.5 -4.85" width="1"
             height="0.35" depth="0.02" color="#003087"></a-box>
      <a-box position="0.55 3.15 -4.85" width="1"
             height="0.35" depth="0.02" color="#D21034"></a-box>

      <!-- Fenetres -->
      <a-box position="-5.9 3 -2" rotation="0 90 0"
             width="1.5" height="1.5" depth="0.05" color="#87CEEB"></a-box>
      <a-box position="-5.9 3 2" rotation="0 90 0"
             width="1.5" height="1.5" depth="0.05" color="#87CEEB"></a-box>

      <!-- Chaises et bureaux eleves -->
      <a-box position="-2 0.4 0" width="1.2"
             height="0.06" depth="0.8" color="#8B4513"></a-box>
      <a-box position="2 0.4 0" width="1.2"
             height="0.06" depth="0.8" color="#8B4513"></a-box>
      <a-box position="-2 0.4 2" width="1.2"
             height="0.06" depth="0.8" color="#8B4513"></a-box>
      <a-box position="2 0.4 2" width="1.2"
             height="0.06" depth="0.8" color="#8B4513"></a-box>

      <!-- Lumiere -->
      <a-light type="ambient" intensity="0.6"></a-light>
      <a-light type="point" position="0 4 0"
               intensity="0.8" color="#ffffff"></a-light>

      <!-- Camera eleve -->
      <a-camera position="0 1.6 4" wasd-controls="enabled:true">
        <a-cursor color="#FFFF00"></a-cursor>
      </a-camera>

    </a-scene>
  </body>
</html>
